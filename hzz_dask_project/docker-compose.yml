services:
  scheduler:
    build: .
    command: dask scheduler
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    ports:
      - "8786:8786"
      - "8787:8787"

  worker:
    build: .
    command: dask worker tcp://scheduler:8786
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - scheduler

  analysis:
    build: .
    command: python run_dask.py --scheduler tcp://scheduler:8786
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - scheduler
      - worker
    volumes:
      - ./results:/app/results